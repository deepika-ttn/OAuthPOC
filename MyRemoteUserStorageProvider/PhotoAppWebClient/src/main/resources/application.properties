spring.security.oauth2.client.provider.photo-app-web-client.jwk-set-uri=http://localhost:8080/realms/photo-app-web-client/protocol/openid-connect/certs
spring.security.oauth2.client.provider.photo-app-web-client.user-info-uri = http://localhost:8080/realms/photo-app-web-client/protocol/openid-connect/userinfo
spring.security.oauth2.client.provider.photo-app-web-client.user-name-attribute = preferred_username