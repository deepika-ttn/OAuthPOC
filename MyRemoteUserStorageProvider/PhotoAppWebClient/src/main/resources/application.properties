spring.application.name=PhotoAppWebClient
server.port= 8087

spring.security.oauth2.client.registration.photo-app-web-client.client-id = photo-app-web-client
spring.security.oauth2.client.registration.photo-app-web-client.client-secret = ohHPk7lSxpmwVcMFCIAPbZoNs5GkWOkI
spring.security.oauth2.client.registration.photo-app-web-client.scope = openid, profile, roles
